原因の特定に協力してください22:48Claudeが返答しました: このエラーはGitHub ActionsがOIDC経由でAWS IAMロールを引き受けようとした際に権限が不足している場合に発生します。このエラーはGitHub ActionsがOIDC経由でAWS IAMロールを引き受けようとした際に権限が不足している場合に発生します。
主な原因と確認ポイントを説明します。
エラーの原因
AssumeRoleWithWebIdentityの権限がないということは、IAMロールの信頼ポリシー（Trust Policy） の設定に問題がある可能性が高いです。
確認すべき箇所
① IAMロールの信頼ポリシー
AWSコンソール → IAM → ロール → 該当ロール → 「信頼関係」タブで、以下のような設定になっているか確認してください。
json{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Principal": {
        "Federated": "arn:aws:iam::<AWSアカウントID>:oidc-provider/token.actions.githubusercontent.com"
      },
      "Action": "sts:AssumeRoleWithWebIdentity",
      "Condition": {
        "StringEquals": {
          "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
        },
        "StringLike": {
          "token.actions.githubusercontent.com:sub": "repo:or1215/aws-blog-app:*"
        }
      }
    }
  ]
}
② IDプロバイダー（OIDC Provider）の登録確認
AWSコンソール → IAM → 「IDプロバイダー」に以下が登録されているか確認。
項目値プロバイダーURLhttps://token.actions.githubusercontent.com対象者（Audience）sts.amazonaws.com
③ GitHub Actionsのワークフローファイル確認
yamlpermissions:
  id-token: write   # ← これが必須
  contents: read

- name: Configure AWS credentials
  uses: aws-actions/configure-aws-credentials@v4
  with:
    role-to-assume: arn:aws:iam::<AWSアカウントID>:role/<ロール名>
    aws-region: ap-northeast-1
permissions: id-token: write がないとOIDCトークンが発行されません。
