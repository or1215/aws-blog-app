信頼ポリシーの確認
AWSコンソール → IAM → ロール → GitHubActions-BlogApp-Deploy-Role → 「信頼関係」タブ を開いて、以下と一致しているか確認してください。
json{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Principal": {
        "Federated": "arn:aws:iam::370442296498:oidc-provider/token.actions.githubusercontent.com"
      },
      "Action": "sts:AssumeRoleWithWebIdentity",
      "Condition": {
        "StringEquals": {
          "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
        },
        "StringLike": {
          "token.actions.githubusercontent.com:sub": "repo:or1215/aws-blog-app:*"
        }
      }
    }
  ]
}

現在の信頼ポリシーの内容を貼り付けていただければ、問題箇所をすぐに特定できます。あなたの入力: {{
    "Version": "2012-10-17",
    "Statement": [
        {
            "Effect": "Allow",
            "Principal": {
                "Federated": "arn:aws:iam::370442296498:oidc-provider/[token.actions.githubusercontent.com](http://token.actions.githubusercontent.com)"
            },
            "Action": "sts:AssumeRoleWithWebIdentity",
            "Condition": {
                "StringEquals": {
                    "[token.actions.githubusercontent.com](http://token.actions.githubusercontent.com):aud": "[sts.amazonaws.com](http://sts.amazonaws.com)"
                },
                "StringLike": {
                    "[token.actions.githubusercontent.com](http://token.actions.githubusercontent.com):sub": "repo:OR1215/aws-blog-app:*"
                }
            }
        }
    ]
