<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post[1] }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>{{ post[1] }}</h1>
    </header>
    <main>
        <p class="date">{{ post[3] }}</p>
        {% if post[4] %}
        <img src="{{ post[4] }}" alt="サムネイル" style="width:100%;max-height:400px;object-fit:cover;border-radius:5px;margin:10px 0;">
        {% endif %}
        <div class="content">{{ post[2] }}</div>
        <a href="/" class="btn">一覧に戻る</a>
        <form method="POST" action="/post/{{ post[0] }}/delete" style="display:inline;">
            <button type="submit" class="btn-delete" onclick="return confirm('削除しますか？')">削除</button>
        </form>
    </main>
</body>
</html>
