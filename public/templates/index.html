<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>ブログ</h1>
    </header>
    <main>
        <a href="/post/new" class="btn">新規投稿</a>
        <br><br>
        {% for post in posts %}
        <div class="post-card">
            {% if post[4] %}
            <img src="{{ post[4] }}" alt="サムネイル" style="width:100%;max-height:200px;object-fit:cover;border-radius:5px;">
            {% endif %}
            <h2><a href="/post/{{ post[0] }}">{{ post[1] }}</a></h2>
            <p class="date">{{ post[3] }}</p>
            <p>{{ post[2][:100] }}...</p>
        </div>
        {% else %}
        <p>まだ投稿がありません。</p>
        {% endfor %}
    </main>
</body>
</html>
